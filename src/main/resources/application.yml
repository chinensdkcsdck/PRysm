spring:
  application:
    name: Prysm
  main:
    web-application-type: none

prysm:
  review:
    window-lines: 20
    max-snippets-per-file: 3
    max-file-context-chars: 8000
    max-total-context-chars: 40000
    max-file-size-bytes: 1048576
    budget:
      max-files-per-batch: 20
      max-file-context-chars: 8000
      max-patch-chars-per-file: 4000
      max-snippet-chars-per-file: 4000
      max-total-context-chars: 32000
