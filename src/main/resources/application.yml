spring:
  application:
    name: Prysm
  main:
    web-application-type: none

prysm:
  review:
    window-lines: 20
    max-snippets-per-file: 3
    max-file-context-chars: 8000
    max-total-context-chars: 40000
    max-file-size-bytes: 1048576
    enrichment:
      max-body-chars: 4000
      max-commits: 5
      max-commit-message-chars: 300
    gate:
      min-reviewable-files: 1
      min-prompt-chars: 200
  llm:
    enabled: true
    api-base-url: ${LLM_API_BASE_URL:https://dashscope.aliyuncs.com/compatible-mode/v1}
    model: ${LLM_MODEL:qwen-plus}
    timeout-seconds: 60
  optimization:
    rollout-percent: ${PRYSM_OPT_ROLLOUT_PERCENT:0}
    group: ${PRYSM_OPT_GROUP:baseline}
    max-output-tokens:
      enabled: ${PRYSM_OPT_MAX_OUTPUT_TOKENS_ENABLED:false}
      value: ${PRYSM_LLM_MAX_OUTPUT_TOKENS:800}
    fast-path:
      enabled: ${PRYSM_OPT_FAST_PATH_ENABLED:false}
      mode: ${PRYSM_OPT_FAST_PATH_MODE:fast_model}
      fast-model: ${PRYSM_LLM_FAST_MODEL:qwen-turbo}
    compact-prompt:
      enabled: ${PRYSM_OPT_COMPACT_PROMPT_ENABLED:false}
  comment:
    enabled: true
