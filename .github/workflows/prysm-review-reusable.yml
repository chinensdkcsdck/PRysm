name: Prysm Reusable PR Review

on:
  workflow_call:
    inputs:
      prysm-repository:
        required: false
        type: string
        default: chinensdkcsdck/PRysm
      prysm-ref:
        required: false
        type: string
        default: main
      prysm-release-repository:
        required: false
        type: string
        default: chinensdkcsdck/PRysm
      prysm-release-tag:
        required: false
        type: string
        default: latest
      llm-api-base-url:
        required: false
        type: string
        default: https://dashscope.aliyuncs.com/compatible-mode/v1
      llm-model:
        required: false
        type: string
        default: qwen-plus
    secrets:
      LLM_API_KEY:
        required: true

concurrency:
  group: prysm-review-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: true

jobs:
  fast-review:
    name: Fast Review Comment
    runs-on: ubuntu-latest
    timeout-minutes: 10

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
          path: target-repo

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download Prysm jar
        id: download-prysm-jar
        env:
          GH_TOKEN: ${{ github.token }}
          PRYSM_RELEASE_REPOSITORY: ${{ inputs.prysm-release-repository }}
          PRYSM_RELEASE_TAG: ${{ inputs.prysm-release-tag }}
        run: |
          set -euo pipefail
          mkdir -p prysm-dist
          release_args=()
          if [ "$PRYSM_RELEASE_TAG" != "latest" ]; then
            release_args+=("$PRYSM_RELEASE_TAG")
          fi
          if gh release download "${release_args[@]}" --repo "$PRYSM_RELEASE_REPOSITORY" --pattern "prysm.jar" --dir prysm-dist; then
            echo "downloaded=true" >> "$GITHUB_OUTPUT"
            echo "Downloaded prebuilt Prysm jar."
          else
            echo "downloaded=false" >> "$GITHUB_OUTPUT"
            echo "Prebuilt Prysm jar unavailable; falling back to Maven build."
          fi

      - name: Checkout Prysm source
        if: steps.download-prysm-jar.outputs.downloaded != 'true'
        env:
          PRYSM_REPOSITORY: ${{ inputs.prysm-repository }}
          PRYSM_REF: ${{ inputs.prysm-ref }}
        run: |
          set -euo pipefail
          git clone --depth 1 "https://github.com/$PRYSM_REPOSITORY.git" prysm
          cd prysm
          git fetch --depth 1 origin "$PRYSM_REF"
          git checkout --detach FETCH_HEAD

      - name: Set up Maven cache
        if: steps.download-prysm-jar.outputs.downloaded != 'true'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: prysm/pom.xml

      - name: Build Prysm jar
        if: steps.download-prysm-jar.outputs.downloaded != 'true'
        run: |
          set -euo pipefail
          cd prysm
          bash ./mvnw -q -DskipTests package
          cp target/*.jar ../prysm-dist/prysm.jar

      - name: Run fast Prysm review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE_URL: ${{ inputs.llm-api-base-url }}
          LLM_MODEL: ${{ inputs.llm-model }}
          PRYSM_REVIEW_MODE: fast
          PRYSM_WORKSPACE_ROOT: ${{ github.workspace }}/target-repo
        run: java -jar prysm-dist/prysm.jar

      - name: Upload Prysm jar
        uses: actions/upload-artifact@v4
        with:
          name: prysm-jar
          path: prysm-dist/prysm.jar
          if-no-files-found: error

  deep-review:
    name: Deep Review Update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fast-review

    permissions:
      contents: read
      pull-requests: write
      issues: write

    steps:
      - name: Checkout target repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          ref: ${{ github.event.pull_request.head.sha || github.sha }}
          fetch-depth: 1
          persist-credentials: false
          path: target-repo

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download Prysm jar
        uses: actions/download-artifact@v4
        with:
          name: prysm-jar
          path: prysm-dist

      - name: Run deep Prysm review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE_URL: ${{ inputs.llm-api-base-url }}
          LLM_MODEL: ${{ inputs.llm-model }}
          PRYSM_REVIEW_MODE: deep
          PRYSM_WORKSPACE_ROOT: ${{ github.workspace }}/target-repo
        run: java -jar prysm-dist/prysm.jar
