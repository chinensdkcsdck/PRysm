name: Prysm PR Review

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  review:
    name: Run Prysm Review
    runs-on: ubuntu-latest

    permissions:
      contents: read
      pull-requests: read
      issues: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Test with Maven
        run: bash ./mvnw -q test

      - name: Build with Maven
        run: bash ./mvnw -q -DskipTests package

      - name: Run Prysm
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LLM_API_BASE_URL: ${{ vars.LLM_API_BASE_URL || 'https://dashscope.aliyuncs.com/compatible-mode/v1' }}
          LLM_MODEL: ${{ vars.LLM_MODEL || 'qwen-plus' }}
        run: java -jar target/*.jar
