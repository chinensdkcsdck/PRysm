name: Prysm PR Review

on:
  pull_request_target:
    types: [opened, synchronize, reopened]

concurrency:
  group: prysm-review-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  issues: write

env:
  PRYSM_RELEASE_REPOSITORY: Remohdg/PRysm-hdg
  PRYSM_RELEASE_TAG: latest
  LLM_API_BASE_URL: ${{ vars.LLM_API_BASE_URL || 'https://dashscope.aliyuncs.com/compatible-mode/v1' }}
  LLM_MODEL: ${{ vars.LLM_MODEL || 'qwen-plus' }}
  PRYSM_OPT_GROUP: ${{ vars.PRYSM_OPT_GROUP || 'combined' }}
  PRYSM_OPT_ROLLOUT_PERCENT: ${{ vars.PRYSM_OPT_ROLLOUT_PERCENT || '0' }}
  PRYSM_OPT_MAX_OUTPUT_TOKENS_ENABLED: ${{ vars.PRYSM_OPT_MAX_OUTPUT_TOKENS_ENABLED || 'true' }}
  PRYSM_LLM_MAX_OUTPUT_TOKENS: ${{ vars.PRYSM_LLM_MAX_OUTPUT_TOKENS || '800' }}
  PRYSM_OPT_FAST_PATH_ENABLED: ${{ vars.PRYSM_OPT_FAST_PATH_ENABLED || 'true' }}
  PRYSM_OPT_FAST_PATH_MODE: ${{ vars.PRYSM_OPT_FAST_PATH_MODE || 'fast_model' }}
  PRYSM_LLM_FAST_MODEL: ${{ vars.PRYSM_LLM_FAST_MODEL || 'qwen-turbo' }}
  PRYSM_OPT_COMPACT_PROMPT_ENABLED: ${{ vars.PRYSM_OPT_COMPACT_PROMPT_ENABLED || 'true' }}

jobs:
  fast-review:
    name: Fast Review Comment
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false
          path: target-repo

      - name: Checkout trusted Prysm source
        uses: actions/checkout@v4
        with:
          repository: ${{ github.repository }}
          ref: ${{ github.sha }}
          fetch-depth: 1
          path: prysm-source

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven
          cache-dependency-path: prysm-source/pom.xml

      - name: Resolve Prysm jar
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          mkdir -p prysm-dist
          release_args=()
          if [ "$PRYSM_RELEASE_TAG" != "latest" ]; then
            release_args+=("$PRYSM_RELEASE_TAG")
          fi
          if gh release download "${release_args[@]}" --repo "$PRYSM_RELEASE_REPOSITORY" --pattern "prysm.jar" --dir prysm-dist; then
            echo "Downloaded prebuilt Prysm jar."
          else
            echo "Prebuilt Prysm jar unavailable; building from source."
            cd prysm-source
            bash ./mvnw -q -DskipTests package
            cp target/*.jar ../prysm-dist/prysm.jar
          fi

      - name: Run fast Prysm review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          PRYSM_REVIEW_MODE: fast
          PRYSM_WORKSPACE_ROOT: ${{ github.workspace }}/target-repo
        run: java -jar prysm-dist/prysm.jar

      - name: Upload Prysm jar
        uses: actions/upload-artifact@v4
        with:
          name: prysm-jar
          path: prysm-dist/prysm.jar
          if-no-files-found: error

  deep-review:
    name: Deep Review Update
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: fast-review

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          repository: ${{ github.event.pull_request.head.repo.full_name }}
          ref: ${{ github.event.pull_request.head.sha }}
          fetch-depth: 1
          persist-credentials: false
          path: target-repo

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21

      - name: Download Prysm jar
        uses: actions/download-artifact@v4
        with:
          name: prysm-jar
          path: prysm-dist

      - name: Run deep Prysm review
        env:
          GITHUB_TOKEN: ${{ github.token }}
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          PRYSM_REVIEW_MODE: deep
          PRYSM_WORKSPACE_ROOT: ${{ github.workspace }}/target-repo
        run: java -jar prysm-dist/prysm.jar
